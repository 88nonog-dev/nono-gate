name: rebuild-matrix

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  rebuild:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install (deterministic)
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run tests
        run: npm test
